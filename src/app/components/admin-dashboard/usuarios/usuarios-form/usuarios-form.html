<div class="bg-white p-6 rounded-xl shadow-md border border-slate-100 max-w-md mx-auto">
  <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
    <span class="p-2 bg-blue-100 text-blue-600 rounded-lg">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
      </svg>
    </span>
    Registrar Usuario
  </h2>

  <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <!-- Username -->
    <div>
      <label class="block text-sm font-semibold text-slate-600 mb-1">Nombre de Usuario</label>
      <input 
        type="text" 
        formControlName="username"
        placeholder="ej: juan.perez"
        class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
        [ngClass]="{'border-red-500': userForm.get('username')?.invalid && userForm.get('username')?.touched}"
      >
    </div>

    <!-- Password -->
    <div>
      <label class="block text-sm font-semibold text-slate-600 mb-1">Contraseña</label>
      <input 
        type="password" 
        formControlName="password"
        placeholder="••••••••"
        class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
        [ngClass]="{'border-red-500': userForm.get('password')?.invalid && userForm.get('password')?.touched}"
      >
    </div>

    <!-- Role -->
    <div>
      <label class="block text-sm font-semibold text-slate-600 mb-1">Rol del Sistema</label>
      <select 
        formControlName="role"
        class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white outline-none transition-all"
      >
        <option value="ADMIN">Administrador</option>
        <option value="EMPLEADO">Empleado / Vendedor</option>
      </select>
    </div>

    <!-- Botón -->
    <button 
      type="submit" 
      [disabled]="userForm.invalid"
      class="w-full mt-4 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-bold py-2 px-4 rounded-lg shadow-lg shadow-blue-200 transition-all transform active:scale-95"
    >
      Guardar Usuario
    </button>
  </form>
</div>
