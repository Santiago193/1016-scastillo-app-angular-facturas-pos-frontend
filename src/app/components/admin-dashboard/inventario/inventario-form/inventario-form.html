<div class="max-w-4xl mx-auto p-8 bg-white rounded-3xl shadow-sm border border-slate-100">
  <div class="mb-8">
    <h2 class="text-3xl font-black text-slate-800 flex items-center gap-3">
      <span class="material-icons text-blue-600 bg-blue-50 p-2 rounded-xl">add_shopping_cart</span>
      Nuevo Producto
    </h2>
    <p class="text-slate-500 mt-1">Ingresa la información básica para el inventario y punto de venta.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Información Principal -->
    <div class="space-y-4 col-span-2 md:col-span-1">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">Nombre del Producto</label>
        <input [(ngModel)]="nuevoProducto().nombre" type="text" placeholder="Ej: Martillo de uña 16oz" 
          class="w-full p-3 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all">
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">Código de Barras</label>
        <input [(ngModel)]="nuevoProducto().codigoBarras" type="text" placeholder="Escanea o escribe el código" 
          class="w-full p-3 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all">
      </div>

      <div>
  <label class="block text-sm font-bold text-slate-700 mb-2">Categoría</label>
  <div class="relative">
    <span class="material-icons absolute left-3 top-3 text-slate-400 text-sm">category</span>
    <input 
      [(ngModel)]="nuevoProducto().categoria" 
      type="text" 
      placeholder="Ej: Tornillería, Pinturas..." 
      class="w-full p-3 pl-10 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all"
    >
  </div>
</div>
    </div>

    <!-- Precios y Stock -->
    <div class="space-y-4 col-span-2 md:col-span-1 bg-slate-50 p-6 rounded-3xl border border-slate-100">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">Precio Compra</label>
          <div class="relative">
            <span class="absolute left-3 top-3 text-slate-400">$</span>
            <input [(ngModel)]="nuevoProducto().precioCompra" type="number" 
              class="w-full p-3 pl-8 rounded-2xl border border-slate-200 outline-none focus:border-blue-500">
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">Precio Venta</label>
          <div class="relative">
            <span class="absolute left-3 top-3 text-slate-400">$</span>
            <input [(ngModel)]="nuevoProducto().precioVenta" type="number" 
              class="w-full p-3 pl-8 rounded-2xl border border-slate-200 outline-none focus:border-blue-500">
          </div>
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">Stock Inicial</label>
        <input [(ngModel)]="nuevoProducto().stock" type="number" 
          class="w-full p-3 rounded-2xl border border-slate-200 outline-none focus:border-blue-500">
      </div>

      <div class="flex items-center gap-3 pt-2">
        <input type="checkbox" [(ngModel)]="nuevoProducto().activo" id="status" class="w-5 h-5 accent-blue-600">
        <label for="status" class="text-sm font-bold text-slate-600 cursor-pointer">Disponible para la venta inmediata</label>
      </div>
    </div>

    <!-- Botón de Acción -->
    <div class="col-span-2 mt-4">
      <button (click)="registrar()" 
        class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-black text-lg rounded-2xl transition-all shadow-lg shadow-blue-200 active:scale-[0.98]">
        GUARDAR PRODUCTO
      </button>
    </div>
  </div>
</div>
